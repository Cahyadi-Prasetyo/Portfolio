<!doctype html>
<html lang="id" data-lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Cahyadi Prasetyo — Full-Stack Developer building web solutions for real business problems." />
		<meta property="og:title" content="Cahyadi Prasetyo — Full-Stack Developer" />
		<meta property="og:description" content="Full-Stack Developer building web solutions for real business problems." />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="/og-image.webp" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Cahyadi Prasetyo — Full-Stack Developer" />
		<meta name="twitter:description" content="Full-Stack Developer building web solutions for real business problems." />
		<meta name="twitter:image" content="/og-image.webp" />
		<meta name="theme-color" content="#171717" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
		<script>
			try {
				const t = localStorage.getItem('portfolio-theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<noscript><style>.reveal{opacity:1!important;transform:none!important}</style></noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
